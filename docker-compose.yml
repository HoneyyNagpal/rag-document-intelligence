version: "3.9"

services:
  backend:
    build: ./backend
    container_name: docintel-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_store:/app/chroma_store
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: docintel-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
